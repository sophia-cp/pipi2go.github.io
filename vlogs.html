<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vlogs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="protectPage()">

  <nav class="navbar">
    <a href="home.html" class="home-icon">⌂</a>
  </nav>

  <main class="page-container">
    <section class="content-section">
      <h1 class="page-title">vlogs</h1>
      <p class="page-text">a little archive of my videos ♡</p>

      <div class="video-grid">

        <div class="video-card">
          <h2>vlog one</h2>
          <div class="video-wrapper">
            <iframe 
              src="https://www.youtube-nocookie.com/embed/Ey6FRsJLhWA"
              title="Vlog One"
              frameborder="0"
              allowfullscreen>
            </iframe>
          </div>
          <p>little caption goes here</p>
        </div>

        <div class="video-card">
          <h2>vlog two</h2>
          <div class="video-wrapper">
            <iframe 
              src="https://www.youtube-nocookie.com/embed/qSbds7HD5Og"
              title="Vlog Two"
              frameborder="0"
              allowfullscreen>
            </iframe>
          </div>
          <p>another little caption</p>
        </div>

      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
